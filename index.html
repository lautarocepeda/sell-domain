<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dominios en Venta | hotelfierro.com</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background-hero">
        <img src="hotel-background.jpg" alt="Fondo" class="hero-img">
        <div class="overlay"></div>
    </div>

    <div class="container">
        <header>
            <div class="badge">Aviso</div>
            <h1 class="brand-title">Hotel Fierro</h1>
            <p class="subtitle">Información sobre nombres de dominio</p>
        </header>

        <section class="domain-showcase">
            <div class="domain-card">
                <span class="domain-name">hotelfierro<span class="tld">.com</span></span>
            </div>
            <div class="domain-card">
                <span class="domain-name">hotelfierro<span class="tld">.com.ar</span></span>
            </div>
        </section>

        <section class="info-section">
            <h2>Dominios en Venta</h2>
            <p>Los nombres de dominio listados en esta página se encuentran actualmente a la venta por parte de su titular.</p>
        </section>

        <section class="cta-section">
            <a href="mailto:tuemail@ejemplo.com?subject=Consulta sobre dominios hotelfierro" class="btn-contact">Contactar al titular</a>
        </section>

        <footer>
            <p>&copy; 2026 - hotelfierro.com</p>
        </footer>
    </div>
</body>
</html>
